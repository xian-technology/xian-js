name: Release

on:
  push:
    tags:
      - "v*"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: xian-js
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          path: xian-js

      - name: Check out xian-contracting
        uses: actions/checkout@v6
        with:
          repository: ${{ github.repository_owner }}/xian-contracting
          ref: main
          path: xian-contracting

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install wasm-pack
        run: |
          if ! command -v wasm-pack >/dev/null 2>&1; then
            cargo install wasm-pack --version 0.14.0 --locked
          fi
          wasm-pack --version

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: xian-js/package-lock.json

      - name: Install dependencies
        run: npm install

      - name: Build shared compiler
        run: npm run build:compiler

      - name: Validate workspace
        run: npm run validate

      - name: Verify package versions match tag
        run: |
          node <<'NODE'
          const fs = require("node:fs");

          const expected = process.env.GITHUB_REF_NAME.replace(/^v/, "");
          const packageFiles = [
            "packages/types/package.json",
            "packages/client/package.json",
            "packages/provider/package.json"
          ];

          for (const file of packageFiles) {
            const pkg = JSON.parse(fs.readFileSync(file, "utf8"));
            if (pkg.version !== expected) {
              throw new Error(`${file} has version ${pkg.version}, expected ${expected}`);
            }
          }
          NODE

      - name: Pack published packages
        run: |
          mkdir -p release-dist
          npm pack --workspace @xian-tech/types --pack-destination release-dist
          npm pack --workspace @xian-tech/client --pack-destination release-dist
          npm pack --workspace @xian-tech/provider --pack-destination release-dist

      - name: Upload release artifacts
        uses: actions/upload-artifact@v6
        with:
          name: release-dist
          path: xian-js/release-dist/*
          if-no-files-found: error
          retention-days: 14

  publish:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    environment:
      name: npm
    steps:
      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: https://registry.npmjs.org

      - name: Download release artifacts
        uses: actions/download-artifact@v6
        with:
          name: release-dist
          path: release-dist

      - name: Publish packages to npm
        run: |
          for package in \
            release-dist/xian-tech-types-*.tgz \
            release-dist/xian-tech-client-*.tgz \
            release-dist/xian-tech-provider-*.tgz
          do
            metadata="$(
              tar -xOf "$package" package/package.json \
                | node -e 'let input = ""; process.stdin.on("data", chunk => input += chunk); process.stdin.on("end", () => { const pkg = JSON.parse(input); console.log(`${pkg.name}\t${pkg.version}`); });'
            )"
            name="${metadata%%$'\t'*}"
            version="${metadata#*$'\t'}"
            if npm view "${name}@${version}" version >/dev/null 2>&1; then
              echo "${name}@${version} is already published; skipping"
              continue
            fi
            npm publish "./$package" --provenance --access public
          done

  github-release:
    needs:
      - build
      - publish
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v6
        with:
          name: release-dist
          path: release-dist

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" release-dist/* \
            --repo "${GITHUB_REPOSITORY}" \
            --verify-tag \
            --title "xian-js ${GITHUB_REF_NAME#v}" \
            --generate-notes
