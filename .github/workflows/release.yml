name: Release

on:
  push:
    tags:
      - "v*"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Install Rollup Linux native package
        run: |
          node <<'NODE'
          const { execFileSync } = require("node:child_process");
          const { arch, platform } = process;

          if (platform === "linux" && arch === "x64") {
            const version = require("./node_modules/rollup/package.json").version;
            execFileSync(
              "npm",
              ["install", "--no-save", `@rollup/rollup-linux-x64-gnu@${version}`],
              { stdio: "inherit" }
            );
          }
          NODE

      - name: Validate workspace
        run: npm run validate

      - name: Verify package versions match tag
        run: |
          node <<'NODE'
          const fs = require("node:fs");

          const expected = process.env.GITHUB_REF_NAME.replace(/^v/, "");
          const packageFiles = [
            "packages/client/package.json",
            "packages/provider/package.json"
          ];

          for (const file of packageFiles) {
            const pkg = JSON.parse(fs.readFileSync(file, "utf8"));
            if (pkg.version !== expected) {
              throw new Error(`${file} has version ${pkg.version}, expected ${expected}`);
            }
          }
          NODE

      - name: Pack published packages
        run: |
          mkdir -p release-dist
          npm pack --workspace @xian-tech/client --pack-destination release-dist
          npm pack --workspace @xian-tech/provider --pack-destination release-dist

      - name: Upload release artifacts
        uses: actions/upload-artifact@v6
        with:
          name: release-dist
          path: release-dist/*
          if-no-files-found: error
          retention-days: 14

  publish:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    environment:
      name: npm
    steps:
      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          registry-url: https://registry.npmjs.org

      - name: Download release artifacts
        uses: actions/download-artifact@v6
        with:
          name: release-dist
          path: release-dist

      - name: Publish packages to npm
        run: |
          for package in release-dist/*.tgz; do
            npm publish "./$package" --provenance --access public
          done

  github-release:
    needs:
      - build
      - publish
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v6
        with:
          name: release-dist
          path: release-dist

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" release-dist/* \
            --repo "${GITHUB_REPOSITORY}" \
            --verify-tag \
            --title "xian-js ${GITHUB_REF_NAME#v}" \
            --generate-notes
